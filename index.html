<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Emergency Dopamine System</title>

  <style>
    body {
      background: black;
      color: #00ff9f;
      font-family: monospace;
      padding: 30px;
    }

    .boot {
      white-space: pre-line;
      margin-bottom: 20px;
      min-height: 120px;
    }

    h1 {
      margin-top: 10px;
    }

    input {
      background: black;
      color: #00ff9f;
      border: 1px solid #00ff9f;
      padding: 8px;
      font-family: monospace;
      margin-top: 10px;
    }

    button {
      background: black;
      color: #00ff9f;
      border: 1px solid #00ff9f;
      padding: 8px;
      cursor: pointer;
      font-family: monospace;
      margin-left: 5px;
    }

    #output {
      margin-top: 20px;
      white-space: pre-line;
    }

    .stats {
      margin-top: 20px;
      opacity: 0.8;
    }
  </style>
</head>

<body>

<div class="boot" id="boot"></div>

<div id="main" style="display:none;">
  
  <h1>Emergency Dopamine System</h1>

  <p>
  Hello TG.<br><br>

  This system supports executive function recovery,<br>
  dopamine regulation, and cognitive overload management.<br><br>

  Available commands:<br>
  random | laugh | focus | taylor<br><br>

  Type command and press ENTER.
  </p>


  <input id="cmd" onkeydown="handleKey(event)">
  <button onclick="runCommand()">ENTER</button>

  <div id="output"></div>
  <div id="stats"></div>

</div>

</body>


<script>

const bootText = `
Booting Emergency Dopamine System...
Initializing cognitive modules...
Loading dopamine stabilizer...
████████░░ 82%
System ready.
`;

function typeBoot(text) {
  let i = 0;
  let speed = 30;

  function type() {
    if (i < text.length) {
      document.getElementById("boot").innerText += text.charAt(i);
      i++;
      setTimeout(type, speed);
    } else {
      document.getElementById("main").style.display = "block";
    }
  }

  type();
}

typeBoot(bootText);

// COMMAND SYSTEM
const messages = {
  random: [
    "Drink water.",
    "Open ONE tab, not 37.",
    "Small step = valid progress.",
    "You are allowed to start messy."
  ],

  laugh: [
    "Debugging: being the detective in a crime movie where you're also the murderer.",
    "There are 10 types of people...",
    "Why do programmers prefer dark mode? Because light attracts bugs."
  ],

  focus: [
    "One task. Not everything.",
    "Start ugly, improve later.",
    "5 minutes is enough to begin."
  ],

  taylor: [
    "You’re on your own kid… but like, in a productive way.",
    "It’s giving executive function recovery.",
    "All too well (10 min version) = focus timer."
  ]
};

function runCommand() {
  const input = document.getElementById("cmd").value.trim().toLowerCase();

  let output = "";

  if (messages[input]) {
    const list = messages[input];
    output = list[Math.floor(Math.random() * list.length)];
  } else {
    output = "Unknown command. Try: random, laugh, focus, taylor";
  }

  document.getElementById("output").innerText = "> " + output;

  updateDopamine();
}

// ENTER KEY (Update 1)
function handleKey(event) {
  if (event.key === "Enter") {
    runCommand();
  }
}

// DOPAMINE SYSTEM (Update 4)
function updateDopamine() {
  const focus = Math.floor(Math.random() * 100);
  const energy = Math.floor(Math.random() * 100);
  const chaos = Math.floor(Math.random() * 100);

  let advice = "";

  if (focus < 40) advice += "- Start very small\n";
  if (energy < 40) advice += "- Coffee / break recommended\n";
  if (chaos > 70) advice += "- Embrace chaos\n";

  document.getElementById("stats").innerText =
`DOPAMINE STATUS
----------------
Focus:  ${focus}%
Energy: ${energy}%
Chaos:  ${chaos}%

${advice}`;
}

</script>
</body>
</html>
