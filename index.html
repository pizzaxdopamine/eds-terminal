<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Dopamine System</title>

  <style>
    body {
      background: black;
      color: #00ff9f;
      font-family: monospace;
      padding: 30px;
    }

    .boot {
      white-space: pre-line;
      margin-bottom: 20px;
    }

    button {
      background: black;
      color: #00ff9f;
      border: 1px solid #00ff9f;
      padding: 10px;
      cursor: pointer;
      font-family: monospace;
    }

    #output {
      margin-top: 20px;
    }
  </style>
</head>

<body>

<div class="boot" id="boot"></div>



<script>
const boot = `
Booting Emergency Dopamine System...
Checking executive function...
████████░░ 82%
System ready.
`;

document.getElementById("boot").innerText = boot;

const messages = [
  "Drink water.",
  "Open ONE tab, not 37.",
  "You are allowed to start messy.",
  "Small step = valid progress.",
  "Taylor Swift approves this pause.",
  "Your brain is buffering... please wait.",
  "Progress > perfection."
];

<p>> Type command (random, laugh, focus, taylor):</p>

<input id="cmd"
  style="background:black;color:#00ff9f;border:1px solid #00ff9f;padding:8px;font-family:monospace;">

<button onclick="runCommand()">ENTER</button>

<div id="output"></div>
  const messages = {
  random: [
    "Drink water.",
    "Open ONE tab, not 37.",
    "Small step = valid progress.",
    "You are allowed to start messy."
  ],

  laugh: [
    "Debugging: being the detective in a crime movie where you're also the murderer.",
    "There are 10 types of people...",
    "Why do programmers prefer dark mode? Because light attracts bugs."
  ],

  focus: [
    "One task. Not everything.",
    "Start ugly, improve later.",
    "5 minutes is enough to begin."
  ],

  taylor: [
    "You’re on your own kid… but like, in a productive way.",
    "It’s giving executive function recovery.",
    "All too well (10 min version) = focus timer."
  ]
};

function runCommand() {
  const input = document.getElementById("cmd").value.trim().toLowerCase();

  let output = "";

  if (messages[input]) {
    const list = messages[input];
    output = list[Math.floor(Math.random() * list.length)];
  } else {
    output = "Unknown command. Try: random, laugh, focus, taylor";
  }

  document.getElementById("output").innerText = "> " + output;
}
</script>

</body>
</html>
