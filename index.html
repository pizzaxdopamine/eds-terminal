    }

  type();
}

// DOPAMINE STATUS SYSTEM
function generateStatus(a) {
  const sleep = parseFloat(a[0]) || 0;
  const coffee = parseInt(a[1]) || 0;
  const overwhelm = parseInt(a[2]) || 0;

  let focus = Math.max(0, 100 - overwhelm * 10 + sleep * 5);
  let energy = Math.max(0, 50 + sleep * 10 - coffee * 10);
  let chaos = overwhelm * 10 + coffee * 5;

  let advice = "";

  if (sleep < 6) advice += "- Low sleep detected → rest recommended\n";
  if (coffee > 3) advice += "- High caffeine intake → consider break\n";
  if (overwhelm > 6) advice += "- High cognitive load → reduce tasks\n";

  return `
DOPAMINE STATUS (user-based)
---------------------------
Focus:  ${focus}%
Energy: ${energy}%
Chaos:  ${chaos}%

${advice}`;
}
