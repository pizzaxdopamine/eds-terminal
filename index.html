<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Emergency Dopamine System</title>

  <style>
    body {
      background: black;
      color: #00ff9f;
      font-family: monospace;
      padding: 30px;
    }

    .boot {
      white-space: pre-line;
      margin-bottom: 20px;
      min-height: 120px;
    }

    h1 {
      margin-top: 10px;
    }

    input {
      background: black;
      color: #00ff9f;
      border: 1px solid #00ff9f;
      padding: 8px;
      font-family: monospace;
      margin-top: 10px;
    }

    button {
      background: black;
      color: #00ff9f;
      border: 1px solid #00ff9f;
      padding: 8px;
      cursor: pointer;
      font-family: monospace;
      margin-left: 5px;
    }

    #output {
      margin-top: 20px;
      white-space: pre-line;
    }

    .stats {
      margin-top: 20px;
      opacity: 0.8;
    }
  </style>
</head>

<body>

<div class="boot" id="boot"></div>

<div id="main" style="display:none;">
  
  <h1>Emergency Dopamine System</h1>

  <p>
  Hello TG.<br><br>

  This system supports executive function recovery,<br>
  dopamine regulation, and cognitive overload management.<br><br>

  Available commands:<br>
  status | laugh | focus | taylor | random<br><br>

  Type command and press ENTER.
  </p>


  <input id="cmd" onkeydown="handleKey(event)">
  <button onclick="runCommand()">ENTER</button>

  <div id="output"></div>
  <div id="stats"></div>

</div>

</body>


<script>

const bootText = `
Booting Emergency Dopamine System...
Initializing cognitive modules...
Loading dopamine stabilizer...
████████░░ 82%
System ready.
`;

window.onload = function () {
  typeBoot(bootText);
};

function typeBoot(text) {
  let i = 0;

  function type() {
    if (i < text.length) {
      document.getElementById("boot").innerText += text.charAt(i);
      i++;
      setTimeout(type, 30);
    } else {
      document.getElementById("main").style.display = "block";
    }
  }

  type();
}

// COMMAND SYSTEM
const questions = [
  "How many hours did you sleep?",
  "How many coffees did you have today?",
  "How overwhelmed do you feel (0-10)?"
];
  
const laughMenu =
`SYSTEM HUMOR ENGINE ONLINE

Select interaction type:

1) Roast Mode
2) Dad Joke Mode
3) Fun Facts
4) Exit`;

const roastPool = [
  "You are currently delaying reality with great consistency.",
  "Noted: avoidance pattern detected again.",
  "This is not multitasking. This is organized procrastination.",
  "Your productivity is technically present, but emotionally unavailable.",
  "You opened this instead of doing the thing. Again.",
  "This is less 'busy' and more 'strategically avoiding consequences'.",
  "Your focus is in a different tab and refuses to return.",
  "You are running on intentions and optimism. No execution detected.",
  "You are not stuck. You are just repeatedly choosing the same outcome.",
  "Your task list is longer than your follow-through history.",
  "At this point, hesitation is your default operating system.",
  "You are successfully simulating productivity without any output.",
  "You keep refreshing your options instead of selecting one.",
  "This is a very advanced form of doing nothing intentionally.",
  "You are currently outsourcing discipline to future-you. Future-you has filed a complaint.",
  "You said ‘just a quick break’. The system has recorded 3 hours.",
  "The system notices your presence. It chooses not to comment further.",
  "You are still here. Statistically unexpected, but noted."
];

const dadJokePool = [
  "I have a joke about recursion, but I’ll tell it later… and later… and later.",
  "My motivation is like a broken link — it looked promising.",
  "I would make a productivity joke, but it’s still in the backlog.",
  "I tried to schedule productivity, but it was fully booked.",
  "My thoughts and I had a meeting. Nobody showed up.",
  "I wrote a joke about deadlines, but I missed it.",
  "I asked my brain for an update. It’s still loading.",
  "My focus walked out and left a note saying 'be right back maybe'.",
  "I tried to organize chaos. It became a recurring subscription.",
  "I have a joke about procrastination, but I’ll tell it later.",
  "I told my calendar a joke. It wasn’t scheduled for humor.",
  "My attention span and I are no longer on speaking terms.",
  "I tried to make a plan. The plan resigned immediately.",
  "I asked my system for clarity. It returned a user manual in Latin.",
  "This joke is still loading. Please wait… or don’t."
];

const factPool = [
  "Octopuses have three hearts, but still manage to be more emotionally stable than most systems.",
  "Crows can recognize human faces and hold grudges for years.",
  "Wombats produce cube-shaped poop. Nature really said: optimization.",
  "Your stomach gets a new lining every few days to avoid digesting itself.",
  "Your brain sometimes deletes memories to save storage space. No confirmation dialog.",
  "You are taller in the morning than at night due to spinal compression changes.",
  "Humans share about 60% of their DNA with bananas. This explains a lot, actually.",
  "Cleopatra lived closer in time to the invention of the iPhone than to the building of the Great Pyramid.",
  "Ancient Romans used crushed mouse brains as toothpaste. This is not recommended by modern systems.",
  "Bananas are technically berries. Strawberries are not. Reality is optional.",
  "The shortest war lasted about 38 minutes. Humans are very efficient under pressure.",
  "Lightning is five times hotter than the surface of the sun.",
  "Some clouds weigh over a million kilograms, yet still float casually.",
  "Fun fact: your attention span is currently running multiple background processes.",
  "Fun fact: this system has no idea what it’s doing either, but continues confidently.",
  "Fun fact: most decisions are made before you think you made them.",
  "The human brain runs on roughly 20 watts of power. Less than a lightbulb.",
  "Honey never spoils. Archaeologists have eaten 3000-year-old honey.",
  "Sharks existed before trees."
];
  const messages = {
  random: [
    "Drink water.",
    "Open ONE tab, not 37.",
    "Small step = valid progress.",
    "You are allowed to start messy."
  ],

  focus: [
    "One task. Not everything.",
    "Start ugly, improve later.",
    "5 minutes is enough to begin."
  ],

  taylor: [
    "You’re on your own kid… but like, in a productive way.",
    "It’s giving executive function recovery.",
    "All too well (10 min version) = focus timer."
  ]
    
let statusMode = false;
let statusAnswers = [];
let currentQuestion = 0;
let laughMode = false;
let laughStep = 0;
let laughSelection = "";
    
};

function runCommand() {
const input = document.getElementById("cmd").value.trim().toLowerCase();
const inputField = document.getElementById("cmd");

  let output = "";

  if (input === "status") {
  statusMode = true;
  statusAnswers = [];
  currentQuestion = 0;

  document.getElementById("output").innerText = "> " + questions[currentQuestion];
  document.getElementById("stats").innerText = "";
  inputField.value = "";
  return;
}
if (statusMode) {
  statusAnswers.push(input);
  currentQuestion++;

  if (currentQuestion < questions.length) {
    document.getElementById("output").innerText = "> " + questions[currentQuestion];
  } else {
    statusMode = false;
    document.getElementById("stats").innerText = generateStatus(statusAnswers);
    document.getElementById("output").innerText = "> Status complete.";
  }

  inputField.value = "";
  return;
}
  if (input === "laugh") {
  laughMode = true;
  laughStep = 0;
  laughSelection = "";

  document.getElementById("output").innerText = laughMenu;
  document.getElementById("stats").innerText = "";

  inputField.value = "";
  return;
}
  if (laughMode) {

  // STEP 0 → Auswahl treffen
  if (laughStep === 0) {

    if (input === "1") {
      laughSelection = "roast";
    } 
    else if (input === "2") {
      laughSelection = "dad";
    } 
    else if (input === "3") {
      laughSelection = "facts";
    } 
    else if (input === "4") {
      laughMode = false;
      laughStep = 0;
      document.getElementById("output").innerText = "> exiting humor module.";
      inputField.value = "";
      return;
    } 
    else {
      document.getElementById("output").innerText = "Invalid input. Use 1–4.";
      inputField.value = "";
      return;
    }

    laughStep = 1;
  }

  // STEP 1 → Output generieren
  let result = "";

  if (laughSelection === "roast") {
    result = roastPool[Math.floor(Math.random() * roastPool.length)];
  }

  if (laughSelection === "dad") {
    result = dadJokePool[Math.floor(Math.random() * dadJokePool.length)];
  }

  if (laughSelection === "facts") {
    result = factPool[Math.floor(Math.random() * factPool.length)];
  }

  document.getElementById("output").innerText = result;

  // Reset nach Ausgabe (wichtig!)
  laughMode = false;
  laughStep = 0;
  laughSelection = "";

  inputField.value = "";
  return;
}
  if (messages[input]) {
    const list = messages[input];
    output = list[Math.floor(Math.random() * list.length)];
  } else {
    output = "Unknown command. Try: random, laugh, focus, taylor, status";
  }

  document.getElementById("output").innerText = "> " + output;
  document.getElementById("stats").innerText = "";
  document.getElementById("cmd").value = "";
}

// ENTER KEY (Update 1)
function handleKey(event) {
  if (event.key === "Enter") {
    runCommand();
  }
}

// DOPAMINE SYSTEM (Update 4)
function generateStatus(a) {
  const sleep = parseFloat(a[0]) || 0;
  const coffee = parseInt(a[1]) || 0;
  const overwhelm = parseInt(a[2]) || 0;

  let focus = Math.max(0, 100 - overwhelm * 10 + sleep * 5);
  let energy = Math.max(0, 50 + sleep * 10 - coffee * 10);
  let chaos = overwhelm * 10 + coffee * 5;

  let advice = "";

  if (sleep < 6) advice += "- Low sleep detected → rest recommended\n";
  if (coffee > 3) advice += "- High caffeine intake → consider break\n";
  if (overwhelm > 6) advice += "- High cognitive load → reduce tasks\n";

  return `
DOPAMINE STATUS (user-based)
---------------------------
Focus:  ${focus}%
Energy: ${energy}%
Chaos:  ${chaos}%

${advice}`;
}

</script>
</body>
</html>
